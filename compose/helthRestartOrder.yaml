services:
  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  backend:
    build: ./backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      retries: 5
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      retries: 3
    restart: unless-stopped


db (Postgres) ── healthy? ──▶ backend (Node.js) ── healthy? ──▶ frontend (Nginx)
