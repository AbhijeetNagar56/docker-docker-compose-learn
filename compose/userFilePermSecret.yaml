services:
  backend:
    build: ./backend
    user: "1000:1000"
# dockerfile
FROM node:18
RUN useradd -m appuser
USER appuser


services:
  frontend:
    image: nginx:1.27
    read_only: true
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro



services:
  db:
    image: postgres:16
    secrets:
      - db_password

secrets:
  db_password:
    file: ./secrets/db_password.txt
