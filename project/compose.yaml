version: "3.9"

services:
  frontend:
    container_name: web
    image: devtrack-frontend
    ports:
      - "8080:80"
    environment:
      - BACKEND_URL=http://backend:4321/api
    depends_on:
      backend:
        condition: service_healthy

  backend:
    container_name: server
    image: devtrack-backend
    ports:
      - "4321:4321"
    environment:
      - DB=mysql://root:password@database:3306/db_name
      - FRONTEND_URL=http://frontend:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy

  database:
    container_name: app_mysql2
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
